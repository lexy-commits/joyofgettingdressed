<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>The Joy of Getting Dressed</title>
<meta name="description" content="Shop my looks — fashion, beauty, home & Amazon finds. Curated by Lexy."/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--pink:#E87FAB;--pink-soft:#FBE8F0;--border:#EDD8E8;--cream:#FDFAF7;--white:#fff;--ink:#1E1A1E;--ink-soft:#4A3F4A;--muted:#9A8A9A}
body{font-family:'Jost',sans-serif;background:var(--cream);color:var(--ink);min-height:100vh;overflow-x:hidden}
.site-header{text-align:center;padding:2.2rem 1.5rem 1.6rem;background:var(--white);border-bottom:1px solid var(--border)}
.logo{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;color:var(--ink);margin-bottom:4px}
.logo .j{font-style:italic;background:linear-gradient(90deg,#E87FAB,#a78bc4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.logo-sub{font-size:9px;letter-spacing:0.24em;text-transform:uppercase;color:var(--muted);display:block}
.socials{display:flex;justify-content:center;gap:18px;margin-top:14px}
.socials a{font-size:9px;font-weight:500;letter-spacing:0.18em;text-transform:uppercase;color:var(--muted);text-decoration:none;transition:color 0.2s}
.socials a:hover{color:var(--pink)}
.filter-nav{display:flex;justify-content:center;gap:8px;padding:1.2rem 1.5rem;background:var(--white);border-bottom:1px solid var(--border);flex-wrap:wrap}
.fb{font-family:'Jost',sans-serif;font-size:10px;letter-spacing:0.16em;text-transform:uppercase;background:transparent;border:1px solid var(--border);color:var(--muted);padding:7px 20px;border-radius:30px;cursor:pointer;transition:all 0.22s}
.fb:hover{border-color:var(--pink);color:var(--pink)}
.fb.active{background:linear-gradient(90deg,#E87FAB,#a78bc4);border-color:transparent;color:#fff}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:3px;max-width:900px;margin:0 auto;padding:3px}
@media(max-width:600px){.grid{grid-template-columns:repeat(2,1fr)}}
.gi{position:relative;aspect-ratio:4/5;overflow:hidden;cursor:pointer;background:var(--cream)}
.gi img{width:100%;height:100%;object-fit:cover;display:block;transition:transform 0.4s}
.gi:hover img{transform:scale(1.04)}
.gp{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px}
.gp span{font-size:9px;letter-spacing:0.16em;text-transform:uppercase;color:var(--muted);opacity:0.6}
.gv{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px}
.gv-icon{font-size:36px;line-height:1}
.gv-label{font-size:9px;letter-spacing:0.16em;text-transform:uppercase;color:var(--muted)}
.pill{position:absolute;bottom:10px;left:10px;font-size:9px;font-weight:500;background:rgba(255,255,255,0.82);backdrop-filter:blur(6px);color:var(--pink);padding:4px 10px;border-radius:20px;border:1px solid rgba(255,255,255,0.9);pointer-events:none}
.gh{position:absolute;inset:0;background:rgba(30,26,30,0.28);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity 0.3s}
.gi:hover .gh{opacity:1}
.ghl{font-size:10px;font-weight:500;letter-spacing:0.18em;text-transform:uppercase;color:#fff;background:rgba(232,127,171,0.85);padding:8px 20px;border-radius:30px}
.mb{display:none;position:fixed;inset:0;background:rgba(20,16,20,0.6);backdrop-filter:blur(6px);z-index:1000;align-items:center;justify-content:center;padding:1.5rem}
.mb.open{display:flex}
.modal{background:#fff;border-radius:20px;overflow:hidden;width:100%;max-width:540px;max-height:90vh;display:flex;flex-direction:column;animation:mIn 0.3s cubic-bezier(0.34,1.56,0.64,1)}
@keyframes mIn{from{opacity:0;transform:scale(0.92) translateY(20px)}to{opacity:1;transform:scale(1) translateY(0)}}
.miw{position:relative;flex-shrink:0}
.miw img{width:100%;max-height:320px;object-fit:cover;display:block}
.mip{width:100%;height:200px;display:flex;align-items:center;justify-content:center}
.mvid{width:100%;aspect-ratio:16/9;background:#000}
.mvid iframe{width:100%;height:100%;border:none;display:block}
.mcl{position:absolute;top:12px;right:12px;width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.88);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--ink);backdrop-filter:blur(4px);line-height:1;z-index:2}
.mbd{padding:20px 22px 26px;overflow-y:auto;flex:1}
.mt{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:400;color:var(--ink);margin-bottom:4px;line-height:1.2}
.md{font-size:12px;font-weight:300;color:var(--muted);margin-bottom:16px}
.sl{font-size:8.5px;font-weight:500;letter-spacing:0.22em;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
.pl{display:flex;flex-direction:column;gap:7px}
.pi{display:flex;align-items:center;justify-content:space-between;text-decoration:none;padding:11px 14px;border-radius:12px;background:var(--pink-soft);border:1px solid var(--border);color:var(--ink-soft);font-size:13px;transition:all 0.2s}
.pi:hover{background:#f5d0e4;border-color:var(--pink);color:var(--pink);transform:translateX(3px)}
.pi .ar{font-size:14px;opacity:0.4;transition:opacity 0.2s;flex-shrink:0}
.pi:hover .ar{opacity:1}
.footer{text-align:center;padding:2.5rem 1.5rem;border-top:1px solid var(--border);background:#fff;margin-top:3px}
.fl{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:300;color:var(--ink);margin-bottom:12px}
.fl .j{font-style:italic;background:linear-gradient(90deg,#E87FAB,#a78bc4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.fn{font-size:10.5px;color:var(--muted);font-weight:300;line-height:1.7;max-width:420px;margin:0 auto}
@media(max-width:540px){.modal{border-radius:16px}.miw img{max-height:240px}.mbd{padding:16px 16px 22px}}
</style>
</head>
<body>
<header class="site-header"><div class="logo">The <span class="j">Joy</span> of Getting Dressed</div><span class="logo-sub">Shop My Looks &middot; Curated by Lexy</span><div class="socials"><a href="https://youtube.com/@lexylovesjoy" target="_blank">YouTube</a><a href="https://instagram.com" target="_blank">Instagram</a><a href="https://tiktok.com" target="_blank">TikTok</a></div></header>
<nav class="filter-nav"><button class="fb active" onclick="fg(this,'all')">All</button><button class="fb" onclick="fg(this,'fashion')">Fashion</button><button class="fb" onclick="fg(this,'beauty')">Beauty</button><button class="fb" onclick="fg(this,'home')">Home</button><button class="fb" onclick="fg(this,'amazon')">Amazon Finds</button></nav>
<div class="grid" id="g"></div>
<div class="mb" id="mb" onclick="cm(event)"><div class="modal"><div class="miw" id="miw"><button class="mcl" onclick="cml()">&#x2715;</button></div><div class="mbd"><div class="mt" id="mt"></div><div class="md" id="md"></div><div class="sl">Shop This Look</div><div class="pl" id="pl"></div></div></div></div>
<footer class="footer"><div class="fl">The <span class="j">Joy</span> of Getting Dressed</div><p class="fn">Some links are affiliate links &mdash; I may earn a small commission at no extra cost to you. I only share things I genuinely love. Thank you for supporting the Joy Crew! 🖤</p></footer>
<script>
var L=[{"id":1,"cat":"fashion","title":"Corporate Girlie OOTD","desc":"Elevated, polished, still fly.","imgData":"","videoUrl":"","videoType":"","mediaMode":"photo","bg":"linear-gradient(145deg,#E4F7F2,#FBE8F0)","products":[{"name":"H&M Tailored Blazer","url":""},{"name":"Zara Wide Leg Trouser","url":""},{"name":"Sam Edelman Block Heel","url":""},{"name":"Gold Chunky Hoops","url":""}]},{"id":2,"cat":"beauty","title":"Going Out Makeup at 46","desc":"Full glam GRWM — everything I used.","imgData":"","videoUrl":"","videoType":"","mediaMode":"photo","bg":"linear-gradient(145deg,#FBE8F0,#F1EAF9)","products":[{"name":"Charlotte Tilbury Foundation","url":""},{"name":"NYX Setting Spray","url":""},{"name":"MAC Whirl Lip Liner","url":""},{"name":"Fenty Gloss Bomb","url":""}]},{"id":3,"cat":"fashion","title":"Rock-It Rack: March Edit","desc":"Monthly curated wardrobe picks.","imgData":"","videoUrl":"","videoType":"","mediaMode":"photo","bg":"linear-gradient(145deg,#F1EAF9,#E4F7F2)","products":[{"name":"Mango Midi Dress","url":""},{"name":"Gap Perfect White Tee","url":""},{"name":"Steve Madden Mule","url":""},{"name":"Banana Republic Cardigan","url":""}]},{"id":4,"cat":"amazon","title":"Amazon Finds Under $50","desc":"Luxe look, real-life budget.","imgData":"","videoUrl":"","videoType":"","mediaMode":"photo","bg":"linear-gradient(145deg,#E4F7F2,#E2D4F0)","products":[{"name":"Faux Leather Wide Leg Pants","url":""},{"name":"Ribbed Lounge Set","url":""},{"name":"Gold Chain Belt","url":""},{"name":"Platform Sneakers","url":""}]},{"id":5,"cat":"home","title":"Babe Cave Refresh","desc":"My styling space, elevated.","imgData":"","videoUrl":"","videoType":"","mediaMode":"photo","bg":"linear-gradient(145deg,#FBE8F0,#E4F7F2)","products":[{"name":"Lighted Vanity Mirror","url":""},{"name":"Marble Decorative Tray","url":""},{"name":"Ring Light Stand","url":""},{"name":"Acrylic Jewelry Organizer","url":""}]},{"id":6,"cat":"fashion","title":"Birthday Weekend: AC & NYC","desc":"Every look from the immaculate vibe weekend.","imgData":"","videoUrl":"","videoType":"","mediaMode":"photo","bg":"linear-gradient(145deg,#E2D4F0,#FBE8F0)","products":[{"name":"ZARA Cutout Mini Dress","url":""},{"name":"Steve Madden Clear Heel","url":""},{"name":"H&M Quilted Evening Bag","url":""},{"name":"Mejuri Stacking Rings","url":""}]}];
var cc="all";
function getEmbed(url,type){if(!url)return null;if(type==="youtube"){var m=url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|shorts\/|embed\/))([A-Za-z0-9_-]{11})/);return m?"https://www.youtube.com/embed/"+m[1]+"?rel=0":null;}if(type==="tiktok"){var m2=url.match(/tiktok\.com\/@[^/]+\/video\/(\d+)/);return m2?"https://www.tiktok.com/embed/v2/"+m2[1]:null;}return null;}
function fg(b,c){document.querySelectorAll(".fb").forEach(function(x){x.classList.remove("active")});b.classList.add("active");cc=c;rg();}
function rg(){var g=document.getElementById("g");g.innerHTML="";var f=cc==="all"?L:L.filter(function(l){return l.cat===cc;});f.forEach(function(l){var el=document.createElement("div");el.className="gi";el.onclick=function(){om(l);};
var inner;
if(l.mediaMode==="video"&&l.videoUrl){var embed=getEmbed(l.videoUrl,l.videoType);var emoji=l.videoType==="tiktok"?"🎵":"▶️";inner="<div class='gv' style='background:"+l.bg+"'><div class='gv-icon'>"+emoji+"</div><div class='gv-label'>"+(l.videoType==="tiktok"?"TikTok":"YouTube")+"</div></div>";}
else if(l.imgData){inner="<img src='"+l.imgData+"' alt='"+l.title+"' loading='lazy'/>";}
else{inner="<div class='gp' style='background:"+l.bg+"'><svg width='36' height='36' viewBox='0 0 24 24' fill='none' stroke='#9A8A9A' stroke-width='1.2'><rect x='3' y='3' width='18' height='18' rx='2'/><circle cx='8.5' cy='8.5' r='1.5'/><path d='M21 15l-5-5L5 21'/></svg><span>Coming soon</span></div>";}
el.innerHTML=inner+"<div class='pill'>"+l.products.length+" items</div><div class='gh'><span class='ghl'>Shop This Look</span></div>";g.appendChild(el);});}
function om(l){var iw=document.getElementById("miw");var cb=iw.querySelector(".mcl");iw.innerHTML="";iw.appendChild(cb);
if(l.mediaMode==="video"&&l.videoUrl){var embed=getEmbed(l.videoUrl,l.videoType);if(embed){var vw=document.createElement("div");vw.className="mvid";vw.innerHTML="<iframe src='"+embed+"' allowfullscreen></iframe>";iw.insertBefore(vw,cb);}}
else if(l.imgData){var im=document.createElement("img");im.src=l.imgData;im.alt=l.title;iw.insertBefore(im,cb);}
else{var ph=document.createElement("div");ph.className="mip";ph.style.background=l.bg;ph.innerHTML="<svg width='48' height='48' viewBox='0 0 24 24' fill='none' stroke='#9A8A9A' stroke-width='1.2'><rect x='3' y='3' width='18' height='18' rx='2'/><circle cx='8.5' cy='8.5' r='1.5'/><path d='M21 15l-5-5L5 21'/></svg>";iw.insertBefore(ph,cb);}
document.getElementById("mt").textContent=l.title;document.getElementById("md").textContent=l.desc;
document.getElementById("pl").innerHTML=l.products.map(function(p){return "<a class='pi' href='"+(p.url||"#")+"' target='_blank' rel='noopener noreferrer'><span>"+p.name+"</span><span class='ar'>&#8594;</span></a>";}).join("");
document.getElementById("mb").classList.add("open");document.body.style.overflow="hidden";}
function cm(e){if(e.target===document.getElementById("mb"))cml();}
function cml(){document.getElementById("mb").classList.remove("open");document.body.style.overflow="";}
document.addEventListener("keydown",function(e){if(e.key==="Escape")cml();});
rg();
</script>
</body>
</html>
